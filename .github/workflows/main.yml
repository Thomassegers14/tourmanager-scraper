name: Daily results update

on:
  schedule:
    # Draait om 6, 15, 16 en 19 UTC
    - cron: '0 6,15,16,19 * * *'
  workflow_dispatch:  # ook manueel te starten

permissions:
  contents: write

env:
  START_DATE: '2026-05-08'   # Aanpassen naar officiële startdatum Giro 2026
  DAYS: '23'                 # Duurtijd wedstrijd in dagen (21 etappes + rustdagen)
  TARGET_FOLDER: 'data/processed'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Controleer datumbereik
        id: datecheck
        run: |
          START=${{ env.START_DATE }}
          END=$(date -d "$START + ${{ env.DAYS }} days" +%Y-%m-%d)
          NOW=$(date -u +%Y-%m-%d)
          if [[ "$NOW" < "$START" || "$NOW" > "$END" ]]; then
            echo "Buiten datumbereik ($START → $END) — pipeline overgeslagen."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Binnen datumbereik — pipeline wordt uitgevoerd."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.datecheck.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        if: steps.datecheck.outputs.skip == 'false'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Installeer dependencies
        if: steps.datecheck.outputs.skip == 'false'
        run: pip install -r requirements.txt

      - name: Voer pipeline uit
        if: steps.datecheck.outputs.skip == 'false'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/pipeline.py scrape_results process_results process_favorites process_selections compute_scores compute_rider_points

      - name: Commit & push resultaten
        if: steps.datecheck.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.TARGET_FOLDER }} || true
          if git diff --cached --quiet; then
            echo "Geen wijzigingen om te committen."
          else
            git commit -m "Automatische update: ${{ env.TARGET_FOLDER }} (run ${{ github.run_id }})"
            git push
          fi

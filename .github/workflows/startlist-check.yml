name: Startlist check (aanloop)

# Ververst in de aanloop naar de Tour de France dagelijks om 07:00 CEST de
# startlijst, zodat de ploegstatus (definitief/voorlopig) en de favorieten
# bijgewerkt worden. Loopt enkel in het venster vóór de wedstrijdstart;
# tijdens de wedstrijd neemt main.yml (resultaten) het over.

on:
  schedule:
    - cron: '0 5 * * *'   # 07:00 CEST (= 05:00 UTC in de zomer)
  workflow_dispatch:  # ook manueel te starten

permissions:
  contents: write

env:
  START_DATE: '2026-06-27'   # vanaf morgen
  END_DATE: '2026-07-04'     # t/m de ochtend van de wedstrijdstart
  TARGET_FOLDER: 'data/processed'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Controleer datumbereik
        id: datecheck
        run: |
          START=${{ env.START_DATE }}
          END=${{ env.END_DATE }}
          NOW=$(date -u +%Y-%m-%d)
          if [[ "$NOW" < "$START" || "$NOW" > "$END" ]]; then
            echo "Buiten aanloopvenster ($START → $END) — overgeslagen."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Binnen aanloopvenster — startlijst wordt ververst."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.datecheck.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        if: steps.datecheck.outputs.skip == 'false'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Installeer dependencies
        if: steps.datecheck.outputs.skip == 'false'
        run: pip install -r requirements.txt

      - name: Ververs startlijst en favorieten
        if: steps.datecheck.outputs.skip == 'false'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SCRAPER_PROXY: ${{ secrets.SCRAPER_PROXY }}
        run: python scripts/pipeline.py scrape_startlists scrape_stages process_favorites

      - name: Commit & push resultaten
        if: steps.datecheck.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.TARGET_FOLDER }} || true
          if git diff --cached --quiet; then
            echo "Geen wijzigingen om te committen."
          else
            git commit -m "Automatische startlist-update: ${{ env.TARGET_FOLDER }} (run ${{ github.run_id }})"
            git push
          fi
